# Uplink configuration
/**:
  ros__parameters:
    # Queue parameters
    max_queue_size: 100 # Maximum pending targets

    # Retry settings
    max_retries: 3
    retry_interval_sec: 1.0

    # Rate limiting
    min_publish_interval_sec: 0.5 # Minimum time between publishes

    # Telemetry settings
    enable_heartbeat: true
    heartbeat_interval_sec: 5.0

    # Logging
    log_all_targets: true
