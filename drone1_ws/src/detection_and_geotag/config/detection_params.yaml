# =============================================================================
# Detection and Geotag Configuration
# =============================================================================
# Author: Shaan Shoukath
# Configure camera settings, HSV thresholds, and detection parameters.
# =============================================================================

/**:
  ros__parameters:
    # =========================================================================
    # VIDEO INPUT SETTINGS
    # =========================================================================
    # Configure these based on your camera/video source

    # Frame dimensions (square video recommended for consistent FOV)
    image_width: 720 # Video width in pixels
    image_height: 720 # Video height in pixels (same as width for square)

    # Processing framerate (skip frames to reduce CPU load)
    # Set to camera FPS for full processing, or lower to skip frames
    target_fps: 10.0 # Process this many frames per second

    # =========================================================================
    # CAMERA INTRINSICS
    # =========================================================================
    # Calibrate these for your specific camera
    # For square video (720x720), principal point is center (360, 360)

    camera_fx: 430.0 # Focal length X (pixels)
    camera_fy: 430.0 # Focal length Y (pixels)
    camera_cx: 360.0 # Principal point X (image_width / 2)
    camera_cy: 360.0 # Principal point Y (image_height / 2)

    # Camera orientation (pointing straight down)
    camera_roll: 0.0
    camera_pitch: 1.5708 # 90 degrees (π/2)
    camera_yaw: 0.0

    # Field of View for fallback calculation (when scipy unavailable)
    # Adjust based on your camera lens
    hfov_deg: 60.0 # Horizontal FOV (degrees)
    vfov_deg: 60.0 # Vertical FOV (degrees) - same as hfov for square

    # =========================================================================
    # YELLOW DISEASE DETECTION - HSV RANGE
    # =========================================================================
    # Tune these for your specific disease color appearance
    # Use a color picker tool to find optimal values

    # Hue: 20-35 (yellow range)
    yellow_h_min: 20
    yellow_h_max: 35
    # Saturation: 50-255 (includes light/pale yellows)
    yellow_s_min: 50
    yellow_s_max: 255
    # Value: 50-255 (includes dark yellows)
    yellow_v_min: 50
    yellow_v_max: 255

    # =========================================================================
    # GREEN VEGETATION DETECTION (Plant Context)
    # =========================================================================
    # Used to validate disease is on plants, not bare ground

    green_h_min: 35
    green_h_max: 85
    green_s_min: 30
    green_s_max: 255
    green_v_min: 30
    green_v_max: 255

    # =========================================================================
    # BROWN/SAND EXCLUSION (Ground Filtering)
    # =========================================================================
    # Exclude soil/sand to reduce false positives

    brown_h_min: 5
    brown_h_max: 18
    brown_s_min: 10
    brown_s_max: 100
    brown_v_min: 40
    brown_v_max: 180

    # =========================================================================
    # DETECTION THRESHOLDS
    # =========================================================================

    # Minimum area (pixels) for valid detection
    # Increase if getting too many small false positives
    min_detection_area: 250

    # Required green pixels near detection for "plant context"
    min_green_nearby: 150

    # GPS deduplication radius (meters)
    # Don't log new detections within this radius of previous ones
    gps_dedup_distance_m: 3.0

    # =========================================================================
    # OUTPUT SETTINGS
    # =========================================================================

    # Publish debug visualization image
    publish_debug: true

    # Log detections to CSV file
    log_to_csv: true
    csv_log_path: "/tmp/disease_detections.csv"
