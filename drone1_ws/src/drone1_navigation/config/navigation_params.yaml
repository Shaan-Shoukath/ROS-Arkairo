# =============================================================================
# Drone-1 Navigation Configuration
# =============================================================================
# Author: Shaan Shoukath
# Sequential waypoint following from KML lane planner
# =============================================================================

/**:
  ros__parameters:
    # =========================================================================
    # ALTITUDE SETTINGS (meters) - 22 feet = 6.7m
    # =========================================================================
    # >>> CHANGE THESE VALUES FOR DIFFERENT FLIGHT HEIGHTS <<<

    takeoff_altitude_m: 6.7 # Takeoff height (22 feet)
    navigation_altitude_m: 6.7 # Survey/cruise height (22 feet)

    # =========================================================================
    # NAVIGATION SETTINGS
    # =========================================================================
    waypoint_arrival_radius_m: 3.0 # Waypoint acceptance radius
    path_lookahead_m: 12.0 # Pure-pursuit lookahead distance
    path_max_target_step_m: 25.0 # Max step size along path
    path_end_radius_m: 5.0 # Mission complete radius
    setpoint_rate_hz: 10.0 # MUST BE ≥10Hz for ArduPilot GUIDED

    # =========================================================================
    # TIMEOUT SETTINGS (seconds)
    # =========================================================================
    fcu_timeout_sec: 30.0 # Timeout waiting for FCU connection
    takeoff_timeout_sec: 90.0 # Timeout waiting for takeoff complete

    # =========================================================================
    # START LOCATION SETTINGS (Competition Setup)
    # =========================================================================
    # >>> SET THESE FOR YOUR COMPETITION FIELD <<<

    use_gps_home: true
    start_latitude: 10.0478 # 10°02'52"N
    start_longitude: 76.3303 # 76°19'49"E
    start_altitude_m: 0.0
