# Image capture configuration
/**:
  ros__parameters:
    # Camera device settings
    camera_device: "/dev/video0"
    use_usb_camera: true

    # Image parameters
    image_width: 1920
    image_height: 1080
    fps: 30.0

    # Camera intrinsics (example values - calibrate for your camera)
    camera_matrix:
      fx: 1000.0
      fy: 1000.0
      cx: 960.0
      cy: 540.0

    distortion_coefficients:
      k1: 0.0
      k2: 0.0
      p1: 0.0
      p2: 0.0
      k3: 0.0

    # Frame ID
    frame_id: "camera_optical_frame"
