# KML Lane Planner configuration
/**:
  ros__parameters:
    # Missions folder - drop KML files here
    missions_folder: "/home/pacman/Drone/ROS-Arkairo/drone1_ws/mission"

    # Flight paramete
    altitude_m: 6.7 # Flight altitude in meters AGL (22 feet)
    lane_spacing_m: 15.0 # Distance between parallel lines (meters)
    buffer_distance_m: 2.0 # Buffer from polygon boundaries (meters)

    # File watching
    watch_interval_sec: 2.0 # How often to check for new KML files

    # =========================================================================
    # START LOCATION SETTINGS (Competition Setup)
    # =========================================================================
    # >>> SET THESE FOR YOUR COMPETITION FIELD <<<

    # If true, use live GPS position as home; if false, use defaults below
    require_gps_home: false

    # Custom start/home location (used when require_gps_home: false)
    # Set these to your competition field coordinates
    default_home_lat: 10.0478 # 10°02'52"N
    default_home_lon: 76.3303 # 76°19'49"E
