# Centering controller configuration
/**:
  ros__parameters:
    # Image parameters
    image_width: 1920
    image_height: 1080

    # Centering thresholds
    centered_threshold_pixels: 30
    max_velocity_mps: 0.5

    # PID gains
    kp: 0.002
    ki: 0.0001
    kd: 0.001

    # Timeout
    centering_timeout_sec: 30.0

    # Update rate
    control_rate_hz: 20.0
