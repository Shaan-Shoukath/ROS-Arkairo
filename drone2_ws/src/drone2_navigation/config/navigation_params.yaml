# Drone-2 Navigation configuration
/**:
  ros__parameters:
    # Waypoint acceptance radius
    arrival_radius_m: 2.0

    # Speed settings
    approach_speed: 3.0 # m/s

    # Altitude settings
    approach_altitude_m: 10.0

    # Navigation update rate
    update_rate_hz: 10.0

    # Timeout
    navigation_timeout_sec: 120.0
