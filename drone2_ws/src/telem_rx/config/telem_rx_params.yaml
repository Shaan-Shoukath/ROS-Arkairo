# =============================================================================
# Telemetry RX Node Configuration
# =============================================================================
# Author: Shaan Shoukath
# Receives geotags from Drone-1 via MAVLink telemetry
# =============================================================================

telem_rx_node:
  ros__parameters:
    # =========================================================================
    # BUFFER SETTINGS
    # =========================================================================
    buffer_timeout_sec: 5.0 # Timeout for incomplete messages

    # =========================================================================
    # VALIDATION SETTINGS
    # =========================================================================
    validate_coordinates: true # Enable coordinate validation
    max_distance_from_home_m: 10000.0 # Max distance from home (meters)
    home_latitude: 28.4215 # Home GPS (for validation) - SW of KML field
    home_longitude: 77.5243

    # =========================================================================
    # ALTITUDE OVERRIDE
    # =========================================================================
    override_altitude: false # Override incoming altitude
    target_altitude_m: 6.7 # Altitude to use if overriding (22 feet)

    # =========================================================================
    # DUMMY GEOTAG MODE (for testing without Drone-1)
    # =========================================================================
    use_dummy_geotags: false # Enable for testing
    dummy_lat: 28.4223 # Test target (inside KML field)
    dummy_lon: 77.5249 # Test target longitude
    dummy_alt: 6.7 # Test target altitude (22 feet)
    dummy_interval_sec: 10.0 # Send dummy every N seconds
