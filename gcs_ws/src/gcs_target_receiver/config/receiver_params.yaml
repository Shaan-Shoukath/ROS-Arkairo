# GCS Target Receiver configuration
/**:
  ros__parameters:
    # Duplicate detection
    duplicate_distance_threshold_m: 3.0 # Min distance for new target
    duplicate_time_threshold_sec: 60.0 # Time window for duplicates

    # Validation
    min_latitude: -90.0
    max_latitude: 90.0
    min_longitude: -180.0
    max_longitude: 180.0

    # Geofence (optional - set to enable)
    enable_geofence: false
    geofence_center_lat: 0.0
    geofence_center_lon: 0.0
    geofence_radius_m: 10000.0

    # Logging
    log_all_targets: true
    save_targets_to_file: false
    target_log_path: "/tmp/gcs_targets.json"
